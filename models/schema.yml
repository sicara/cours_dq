version: 2

sources:
  - name: birth_data
    tables:
      - name: departements
        config:
          external_location: "read_csv('data/departements.csv')"
          formatter: oldstyle
        description: "Reference table for departments"
        columns:
          - name: CODE
            description: "Department code (ex. 22, 977...)"
            data_tests:
              - unique
          - name: NOM
            description: "Department name (ex. Côtes-d'Armor, Saint-Barthélemy...)"
            data_tests:
              - not_null
      - name: birth_data_2021
        config:
          external_location: "read_csv('data/donnees_naissances_2021.csv', types={'DEPDOM': 'VARCHAR'})"
          formatter: oldstyle
        description: "Official French birth data for the year 2021"
        columns:
          - name: ID
            description: "Unique line identifier"
            data_tests:
              - not_null
              - unique
          - name: ANAIS
            description: "Birth year"
            data_tests:
              - not_null
          - name: AGEMERE
            description: "Mother's age"
            data_tests:
              - value_in_range:
                  min_value: 17
                  max_value: 47
          - name: AGEPERE
            description: "Father's age"
            data_tests:
              - value_in_range:
                  min_value: 17
                  max_value: 47
          - name: AGEXACTM
            description: "Exact mother's age at child birth"
            data_tests:
              - value_in_range:
                  min_value: 17
                  max_value: 47
          - name: AGEXACTP
            description: "Exact father's age at child birth"
            data_tests:
              - value_in_range:
                  min_value: 17
                  max_value: 47
          - name: AMAR
            description: "Parent's mariage year"
            data_tests:
              - is_integer
          - name: DEPDOM
            description: "Department of mother's residence"
            data_tests:
              - relationships:
                  to: ref('departements')
                  field: CODE
